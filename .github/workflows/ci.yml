name: CI

on:
  push:
    branches: [main]
  pull_request:

# Sin secretos: corre en PRs de forks de forma segura. Es el gate de calidad.
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      # --frozen-lockfile: falla si el lockfile no coincide (reproducibilidad + anti-tampering).
      # pnpm no corre build scripts de deps salvo los allowlisteados en pnpm-workspace.yaml.
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit (runtime deps)
        run: pnpm audit --prod

      - name: Commit message lint (conventional + no AI attribution)
        if: github.event_name == 'pull_request'
        run: |
          git log -1 --format=%B > /tmp/msg.txt
          node scripts/check-commit-msg.mjs /tmp/msg.txt

      - name: Anti-slop (UI)
        run: node scripts/check-slop.mjs --all

      - name: Specs index up to date
        run: node scripts/gen-specs-index.mjs

      - name: Tests
        run: pnpm test
