name: Performance & Security Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 2 * * *'  # Diario a las 2 AM

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Deploy to staging
      uses: cloudflare/wrangler-action@v3
      with:
        apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        command: deploy
        environment: staging
    
    - name: Wait for deployment
      run: sleep 30
    
    - name: Install testing tools
      run: |
        npm install -g lighthouse
        npm install -g autocannon
        npm install -g ssl-checker
    
    - name: Run security tests
      run: |
        echo "Testing headers..."
        curl -I https://keanuofrivia-website-staging.santidaross.workers.dev
        
        echo "Testing APIs..."
        curl -s https://keanuofrivia-website-staging.santidaross.workers.dev/api/minecraft-status | jq .
        curl -s https://keanuofrivia-website-staging.santidaross.workers.dev/api/site-config | jq .
    
    - name: Run performance tests
      run: |
        echo "Running Lighthouse..."
        lighthouse https://keanuofrivia-website-staging.santidaross.workers.dev \
          --output=json \
          --output-path=./lighthouse-report.json \
          --chrome-flags="--headless"
        
        echo "Running load test..."
        autocannon -c 10 -d 30 https://keanuofrivia-website-staging.santidaross.workers.dev
    
    - name: Upload Lighthouse report
      uses: actions/upload-artifact@v4
      with:
        name: lighthouse-report
        path: lighthouse-report.json
    
    - name: Check performance scores
      run: |
        if [ -f lighthouse-report.json ]; then
          PERFORMANCE_SCORE=$(node -e "
            const report = JSON.parse(require('fs').readFileSync('lighthouse-report.json'));
            console.log(Math.round(report.lhr.categories.performance.score * 100));
          ")
          
          if [ $PERFORMANCE_SCORE -lt 80 ]; then
            echo "❌ Performance score too low: $PERFORMANCE_SCORE/100"
            exit 1
          else
            echo "✅ Performance score acceptable: $PERFORMANCE_SCORE/100"
          fi
        fi 