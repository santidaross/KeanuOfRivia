<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Keanu Of Rivia</title>
  <link rel="icon" type="image/png" href="/images/favicon.png">

  <meta name="description" content="Mi server, mis juegos y cómo encontrarme.">
  <meta name="author" content="Keanu Of Rivia">
  <link rel="canonical" href="https://keanuofrivia.com">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Keanu Of Rivia">
  <meta property="og:description" content="Mi server de Minecraft, Steam y dónde apoyarme.">
  <meta property="og:image" content="/images/avatar.png">

  <!-- Estilos (orden: reset → colores de marca → diseño) -->
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/brands.css">
  <link rel="stylesheet" href="css/style.css">

  <script src="js/app.js" defer></script>
</head>

<body>
  <!-- Fondo: frames (poster) con crossfade en pausa; el video se superpone al reproducir.
       Dos capas para el crossfade (JS alterna la activa). -->
  <div class="bg-poster" aria-hidden="true"></div>
  <div class="bg-poster" aria-hidden="true"></div>
  <!-- Fondo de video (modo cinematográfico). JS controla play/pause segun reduce-motion + preferencia. -->
  <video class="bg-video" muted loop playsinline preload="metadata">
    <source src="videos/loop.webm" type="video/webm">
    <source src="videos/loop.mp4" type="video/mp4">
  </video>
  <div class="scrim"></div>

  <main class="container">
    <header class="profile">
      <img class="avatar" src="images/avatar.png" width="112" height="112"
           alt="Foto de Keanu Of Rivia" fetchpriority="high">
      <h1><span id="site-name">Keanu Of Rivia</span></h1>
    </header>

    <nav class="button-stack" aria-label="Enlaces">
      <!-- Los botones se generan desde /api/site-config (public/js/app.js). -->
      <noscript>
        <a class="button button-minecraft" href="https://mc.keanuofrivia.com">Minecraft Server</a>
        <a class="button button-steam" href="https://steamcommunity.com/profiles/76561197993066934">Steam</a>
        <a class="button button-coffee" href="https://buymeacoffee.com/keanuofrivia">Buy Me A Coffee</a>
      </noscript>
    </nav>
  </main>

  <!-- Controles del video flotantes en la esquina inferior derecha. -->
  <div class="media-controls">
    <button id="video-toggle" class="video-toggle" type="button" aria-pressed="true"
            aria-label="Pausar video de fondo" title="Pausar video de fondo">
      <svg class="icon-pause" width="14" height="14" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <rect x="6" y="5" width="4" height="14" rx="1"></rect><rect x="14" y="5" width="4" height="14" rx="1"></rect>
      </svg>
      <svg class="icon-play" width="14" height="14" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M8 5v14l11-7z"></path>
      </svg>
    </button>
    <div class="volume-control">
      <div class="volume-popup">
        <input type="range" id="volume-slider" min="0" max="100" value="100"
               aria-label="Volumen del video" title="Volumen">
      </div>
      <button id="mute-toggle" class="video-toggle" type="button" aria-pressed="false"
              aria-label="Activar sonido" title="Activar sonido">
        <svg class="icon-muted" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" fill="currentColor" stroke="none"></polygon>
          <line x1="22" y1="9" x2="16" y2="15"></line><line x1="16" y1="9" x2="22" y2="15"></line>
        </svg>
        <svg class="icon-unmuted" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" fill="currentColor" stroke="none"></polygon>
          <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path><path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>
        </svg>
      </button>
    </div>
  </div>

  <footer>
    <p>© <span id="year">2026</span> Keanu Of Rivia</p>
    <a class="footer-credit" href="https://www.youtube.com/watch?v=bS5P_LAqiVg"
       target="_blank" rel="noopener noreferrer">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path>
        <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path>
      </svg>
      <span>Kung Fury</span>
    </a>
  </footer>
</body>

</html>
